<!DOCTYPE html>
<html lang="en">

<head>
    <title>Brow n GO LinkTree</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">

    <style>
        body {
            background-color: #e9ecef;
        }

        .main-card {
            border-radius: 25px;
            padding: 25px;
            min-height: 90vh;
        }

        .top-icons img {
            width: 35px;
            height: 35px;
            padding: 5px;
            background: #f1f1f1;
        }

        .profile-img {
            width: 90px;
            height: 90px;
        }

        .link-btn {
            background-color: #f1f1f1;
            border: none;
            border-radius: 12px;
            padding: 15px;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .link-btn:hover {
            background-color: #dcdcdc;
            transform: translateY(-2px);
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            text-decoration: none;
        }

        .location-text {
            font-size: 13px;
            color: gray;
        }
    </style>
</head>

<body>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-5">

                <div class="card main-card shadow text-center">

                    <!-- TOP ICON -->
                    <div class="d-flex justify-content-between top-icons">
                        <img src="pohon.jpeg" class="rounded-circle">
                        <img src="share.jpeg" class="rounded-circle">
                    </div>

                    <!-- PROFILE -->
                    <div class="mt-3">
                        <img src="profile2.jpeg" class="rounded-circle profile-img">
                        <h4 class="mt-3 mb-1"><b>Brow & Go</b></h4>
                        <p class="text-muted">No more bad Brow & ready to Go 💙</p>
                    </div>

                    <!-- BUTTONS -->
                    <a href="#" class="link-btn w-100 mt-3 d-block">
                        Booking Surabaya
                    </a>

                    <a href="#" class="link-btn w-100 mt-3 d-block">
                        Booking Jogja
                    </a>

                    <a href="#" class="link-btn w-100 mt-3 d-block">
                        Booking Malang
                    </a>

                    <!-- LOCATION -->
                    <a href="#" class="link-btn w-100 mt-3 text-left">
                        📍 <b>Lokasi Surabaya (Dharmawangsa Unair)</b><br>
                        <span class="location-text">Jl. Dharmawangsa No121, Surabaya</span>
                    </a>

                    <a href="#" class="link-btn w-100 mt-3 text-left">
                        📍 <b>Lokasi Malang (UB)</b><br>
                        <span class="location-text">Jl. Serang No.3, Malang</span>
                    </a>

                    <a href="#" class="link-btn w-100 mt-3 text-left">
                        📍 <b>Lokasi Jogja (Nogolaten)</b><br>
                        <span class="location-text">Nogolaten, Yogyakarta</span>
                    </a>

                    <!-- FOOTER -->
                    <div class="mt-auto pt-4">
                        <small class="text-muted">
                            Cookie Preferences • Report • Privacy
                        </small>
                    </div>

                </div>

            </div>
        </div>
    </div>

</body>

</html>
